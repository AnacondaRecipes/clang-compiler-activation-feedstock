# Previous Stage 1 clang_bootstrap was missing dsymutil, causing cctools Stage 2 to fail
staging_channel_upload_target: llvm-21.1.8-stage1-build-0

channels:
  # Stage 0 channel has clangdev 21, llvm-tools 21, and supporting packages
  - https://staging.continuum.io/pbp/llvm-21.1.8-stage0-build-0
